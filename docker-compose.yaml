services:
  dockermt:
    image: ${DOCKERMT_IMAGE:-dockermt:3.1.1}
    container_name: ${DOCKERMT_CONTAINER_NAME:-dockermt}
    restart: unless-stopped
    volumes:
      - dockermt_config:/config
    ports:
      - "${MT5_WEB_PORT:-43100}:3000"
      - "${MT5_PY_PORT:-48001}:8001"
      - "${TELNETMT_PORT:-41122}:${TELNETMT_PORT:-41122}"
    environment:
      DOCKERMT_CONTAINER_NAME: ${DOCKERMT_CONTAINER_NAME:-dockermt}
      MT5_WEB_PORT: ${MT5_WEB_PORT:-43100}
      MT5_PY_PORT: ${MT5_PY_PORT:-48001}
      TELNETMT_PORT: ${TELNETMT_PORT:-41122}
      MT5_ENABLE_PYTHON: ${MT5_ENABLE_PYTHON:-1}
      TELNETMT_ENABLE: ${TELNETMT_ENABLE:-1}
      CMDMT_BOOTSTRAP_ENABLE: ${CMDMT_BOOTSTRAP_ENABLE:-0}
      CMDMT_SYNC_COMMON: ${CMDMT_SYNC_COMMON:-1}

volumes:
  dockermt_config:
    name: ${DOCKERMT_CONFIG_VOLUME:-dockermt_config}
